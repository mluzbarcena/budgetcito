<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mis Gastos</title>
  <meta name="description" content="Control de gastos mensual personal" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mis Gastos" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <span class="app-logo">₿</span>
        <div>
          <h1 class="app-title">Mis Gastos</h1>
          <button class="month-nav" id="monthDisplay">◀ <span id="monthLabel">Junio 2025</span> ▶</button>
        </div>
      </div>
      <button class="icon-btn" id="openSettings" title="Configuración">⚙</button>
    </header>

    <!-- Summary Cards -->
    <section class="summary-section">
      <div class="summary-card salary-card">
        <span class="card-label">Sueldo neto</span>
        <span class="card-amount" id="summaryIncome">$0</span>
        <button class="icon-btn-sm" id="toggleSalaryBtn" title="Mostrar/ocultar sueldo" aria-label="Mostrar u ocultar sueldo">👁</button>
        <button class="edit-salary-btn" id="editSalaryBtn">editar</button>
      </div>
      <div class="summary-grid">
        <div class="summary-card mini-card">
          <span class="card-label">Gastos totales</span>
          <span class="card-amount danger" id="summaryExpenses">$0</span>
        </div>
        <div class="summary-card mini-card">
          <span class="card-label">Disponible</span>
          <span class="card-amount success" id="summaryAvailable">$0</span>
        </div>
        <div class="summary-card mini-card">
          <span class="card-label">% ahorro</span>
          <span class="card-amount accent" id="summarySavings">0%</span>
        </div>
        <div class="summary-card mini-card">
          <span class="card-label">% gastado</span>
          <span class="card-amount" id="summarySpent">0%</span>
        </div>
      </div>
    </section>

    <!-- Chart -->
    <section class="chart-section">
      <div class="section-header">
        <span class="section-title">Distribución</span>
        <div class="chart-toggle">
          <button class="toggle-btn active" data-chart="donut">Torta</button>
          <button class="toggle-btn" data-chart="bar">Barras</button>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="expenseChart"></canvas>
        <div id="chartEmpty" class="chart-empty hidden">Cargá gastos para ver el gráfico</div>
      </div>
    </section>

    <!-- Expenses List -->
    <section class="expenses-section">
      <div class="section-header">
        <span class="section-title">Gastos fijos</span>
        <span class="section-badge" id="fixedTotal">$0</span>
      </div>
      <ul class="expense-list" id="fixedList"></ul>
      <button class="add-extra-btn" id="addFixedBtn">+ Agregar gasto fijo</button>

      <div class="section-header" style="margin-top:1.5rem">
        <span class="section-title">Gastos variables</span>
        <span class="section-badge" id="variableTotal">$0</span>
      </div>
      <ul class="expense-list" id="variableList"></ul>
      <button class="add-extra-btn" id="addVariableBtn">+ Agregar gasto variable</button>
    </section>

    <div style="height:5rem"></div>
  </div>

  <!-- FAB -->
  <button class="fab" id="prevMonth" title="Mes anterior" style="bottom:5rem;right:5rem;font-size:1.2rem">◀</button>
  <button class="fab" id="nextMonth" title="Mes siguiente" style="bottom:5rem;right:1.5rem;font-size:1.2rem">▶</button>

  <!-- Modal: Set Salary -->
  <div class="modal-overlay hidden" id="salaryModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Sueldo de <span id="salaryMonthLabel"></span></h2>
        <button class="modal-close" id="closeSalaryModal">✕</button>
      </div>
      <label class="input-label">Monto neto (ARS)</label>
      <div class="input-prefix-wrapper">
        <span class="input-prefix">$</span>
        <input type="number" id="salaryInput" class="text-input" placeholder="0" min="0" />
      </div>
      <button class="primary-btn" id="saveSalaryBtn">Guardar</button>
    </div>
  </div>

  <!-- Modal: Edit Expense -->
  <div class="modal-overlay hidden" id="expenseModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="expenseModalTitle">Editar gasto</h2>
        <button class="modal-close" id="closeExpenseModal">✕</button>
      </div>
      <label class="input-label" id="expenseModalNameLabel">Concepto</label>
      <input type="text" id="expenseNameInput" class="text-input hidden" placeholder="Nombre del gasto" />
      <label class="input-label">Monto (ARS)</label>
      <div class="input-prefix-wrapper">
        <span class="input-prefix">$</span>
        <input type="number" id="expenseAmountInput" class="text-input" placeholder="0" min="0" />
      </div>
      <div id="expenseActiveRow" class="toggle-row hidden">
        <label class="input-label" style="margin:0">Incluir este mes</label>
        <label class="switch">
          <input type="checkbox" id="expenseActiveToggle" checked />
          <span class="slider"></span>
        </label>
      </div>
      <div class="modal-actions">
        <button class="danger-btn hidden" id="deleteExpenseBtn">Eliminar</button>
        <button class="primary-btn" id="saveExpenseBtn">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Settings -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Configuración</h2>
        <button class="modal-close" id="closeSettingsModal">✕</button>
      </div>
      <div class="toggle-row">
        <label class="input-label" style="margin:0">Ocultar sueldo</label>
        <label class="switch">
          <input type="checkbox" id="settingsSalaryHidden" />
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Modal: Month Picker -->
  <div class="modal-overlay hidden" id="monthModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Ir a mes</h2>
        <button class="modal-close" id="closeMonthModal">✕</button>
      </div>
      <div class="month-grid" id="monthGrid"></div>
      <input type="number" id="yearInput" class="text-input" placeholder="Año" style="margin-top:1rem" />
      <button class="primary-btn" id="goToMonthBtn" style="margin-top:.75rem">Ir</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
